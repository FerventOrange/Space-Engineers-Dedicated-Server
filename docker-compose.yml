services:
  se-server:
    build: .
    container_name: se-server
    restart: unless-stopped
    ports:
      - "${SERVER_PORT:-27016}:${SERVER_PORT:-27016}/udp"
    volumes:
      - ./world:/server/world
      - ./data/config:/server/config
      - ./data/backups:/server/backups
      - ./data/mods:/server/mods
      - ./data/server-install:/server/install
      - ./data/steam-cache:/home/steam/Steam
      - ./init.sh:/server/init.sh
      - ./entrypoint.sh:/server/entrypoint.sh
      - ./scripts:/server/scripts
      - ./config:/server/config-templates
    environment:
      - SERVER_NAME=${SERVER_NAME:-Space Engineers Server}
      - WORLD_NAME=${WORLD_NAME:-Star System}
      - SERVER_PORT=${SERVER_PORT:-27016}
      - ADMIN_IDS=${ADMIN_IDS:-}
      - MODS=${MODS:-}
      - BACKUP_INTERVAL_HOURS=${BACKUP_INTERVAL_HOURS:-6}
      - BACKUP_RETENTION_DAYS=${BACKUP_RETENTION_DAYS:-7}
      - WORLD_DIR=${WORLD_DIR:-/server/world}
      - BACKUP_DIR=${BACKUP_DIR:-/server/backups}
      - AUTO_UPDATE=${AUTO_UPDATE:-true}
      - MAX_BACKUP_SAVES=${MAX_BACKUP_SAVES:-28}
      - INVENTORY_SIZE_MULTIPLIER=${INVENTORY_SIZE_MULTIPLIER:-10}
      - BLOCKS_INVENTORY_SIZE_MULTIPLIER=${BLOCKS_INVENTORY_SIZE_MULTIPLIER:-10}
      - ASSEMBLER_SPEED_MULTIPLIER=${ASSEMBLER_SPEED_MULTIPLIER:-10}
      - ASSEMBLER_EFFICIENCY_MULTIPLIER=${ASSEMBLER_EFFICIENCY_MULTIPLIER:-10}
      - REFINERY_SPEED_MULTIPLIER=${REFINERY_SPEED_MULTIPLIER:-10}
      - WELDER_SPEED_MULTIPLIER=${WELDER_SPEED_MULTIPLIER:-5}
      - GRINDER_SPEED_MULTIPLIER=${GRINDER_SPEED_MULTIPLIER:-5}
      - HARVEST_RATIO_MULTIPLIER=${HARVEST_RATIO_MULTIPLIER:-5}
      - STEAM_USER=${STEAM_USER:?STEAM_USER is required}
      - STEAM_PASS=${STEAM_PASS:?STEAM_PASS is required}
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 8G
          cpus: '2.0'
          pids: 256
    stop_grace_period: 120s
    stdin_open: true
    tty: true
